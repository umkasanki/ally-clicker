name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test AllyClickerCore (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v5
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test
